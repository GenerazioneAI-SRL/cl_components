name: genai_components
description: >-
  Design system Flutter per Skillera v2. Tokens Stripe-inspired, primitives,
  surfaces, feedback, layout, navigation e data display con light/dark mode.
version: 2.0.0-dev.1
homepage: https://github.com/generazione-ai/genai_components
repository: https://github.com/generazione-ai/genai_components
issue_tracker: https://github.com/generazione-ai/genai_components/issues

topics:
  - ui
  - design-system
  - components
  - theme

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.20.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  very_good_analysis: ^6.0.0
